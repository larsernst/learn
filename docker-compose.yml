services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lernapp
      POSTGRES_PASSWORD: lernapp
      POSTGRES_DB: lernapp
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lernapp -d lernapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://lernapp:lernapp@db:5432/lernapp?schema=public"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET muss als Umgebungsvariable gesetzt werden}"
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-false}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-}"
      NEXT_PUBLIC_APP_NAME: "Lern-App"
      NODE_ENV: production
      PORT: "${WEB_PORT:-3000}"
    ports:
      - "${WEB_PORT:-3000}:${WEB_PORT:-3000}"

volumes:
  pgdata: